<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génération d'Actes Fiscaux en Ligne | CertiConformité</title>
    <!-- Chargement de Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Utilisation de la police Inter -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
        }
        /* Style spécifique pour le bouton WhatsApp flottant */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        /* Styles pour la modale */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
    </style>
    <!-- Configuration de Tailwind pour un thème simple et moderne -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#0056b3', // Bleu foncé pour l'action (Plateforme)
                        'secondary': '#4c7cff', // Bleu clair pour l'accent
                        'whatsapp': '#25D366', // Couleur officielle WhatsApp (pour contact secondaire)
                        'orange-money': '#ff6600', // Orange pour Mobile Money
                        'green-accent': '#10b981', // Vert pour l'option populaire
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen antialiased flex flex-col items-center p-4 sm:p-8">

    <!-- Script de Configuration des Liens, des États et de la Modale -->
    <script>
        // ===========================================
        // CONFIGURATION DES PRIX ET NUMÉROS (MIS À JOUR)
        // ===========================================
        
        // 1. Coordonnées de Réception par Opérateur
        const orangeMoneyNumber = "65 63 42 97"; 
        const moovWaveNumber = "71 86 34 26"; 
        // IMPORTANT: Mettre le numéro de contact du support client ici
        const supportPhoneNumber = "65 63 42 97"; // Numéro de contact support
        const supportWhatsappNumber = supportPhoneNumber; // Utiliser le même pour WhatsApp
        
        // 2. Tarification (XOF)
        const fraisAbonnement = 5000; // Nouveau prix ABONNEMENT 3 MOIS
        const dureeAbonnement = "3 mois"; // Nouvelle durée d'abonnement
        const fraisActeUnique = 1000;  // Nouveau prix ACTE UNIQUE

        // ===========================================
        // FIN DES CONFIGURATIONS
        // ===========================================
        
        const prefilledMessage = "Bonjour, j'ai rencontré un problème lors de la génération d'un acte fiscal sur CertiConformité et j'ai besoin d'aide.";
        const whatsappLink = `https://wa.me/${supportWhatsappNumber.replace(/[^0-9+]/g, '')}?text=${encodeURIComponent(prefilledMessage)}`;
        
        let isAccessGranted = false; // Variable d'état pour le déblocage (simulation)
        let selectedOffer = null; // 'abonnement' ou 'acte_unique'

        // ===================================
        // GESTION DE LA MODALE CUSTOM
        // ===================================

        /**
         * Ouvre la modale avec le contenu spécifié.
         */
        function showModal(title, message, iconClass = 'text-blue-500') {
            const modalOverlay = document.getElementById('custom-modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const modalIcon = document.getElementById('modal-icon');

            modalTitle.textContent = title;
            modalMessage.innerHTML = message; // Utiliser innerHTML pour supporter les balises comme <br>
            
            // Réinitialiser les classes d'icônes et appliquer la nouvelle
            modalIcon.className = `w-12 h-12 mb-4 mx-auto ${iconClass}`; 
            
            modalOverlay.classList.add('open');
        }

        /**
         * Ferme la modale.
         */
        function closeModal() {
            document.getElementById('custom-modal-overlay').classList.remove('open');
        }

        // ===================================
        // FONCTIONS DE NAVIGATION ET D'ACCÈS
        // ===================================
        
        /**
         * Affiche une section et cache les autres (sauf les formulaires, gérés par showActForm)
         */
        function showSection(sectionId) {
            const sections = ['hero-cta-section', 'choix-offre', 'instructions-paiement', 'choix-acte', 'section-aide', 'form-domiciliation', 'form-revenus', 'form-exoneration', 'form-quitus'];
            sections.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.classList.add('hidden');
                }
            });

            const target = document.getElementById(sectionId);
            if (target) {
                target.classList.remove('hidden');
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        /**
         * Affiche la section de choix de l'offre et cache la section HERO.
         */
        function showOfferSelection() {
             showSection('choix-offre');
        }
        
        /**
         * Affiche la section d'aide.
         */
        function showAideSection() {
             showSection('section-aide');
        }

        /**
         * Sélectionne une offre et redirige vers les instructions de paiement.
         * @param {string} offer - 'abonnement' ou 'acte_unique'.
         */
        function selectOffer(offer) {
            selectedOffer = offer;
            let amount;
            let description;

            if (offer === 'abonnement') {
                amount = fraisAbonnement;
                description = `l'abonnement de ${dureeAbonnement}`;
                document.getElementById('acte-count-display').textContent = `Accès Illimité (${dureeAbonnement})`;
            } else if (offer === 'acte_unique') {
                amount = fraisActeUnique;
                description = "un acte unique (le premier que vous choisirez)";
                document.getElementById('acte-count-display').textContent = "1 Acte Unique";
            } else {
                return;
            }

            // Mise à jour de l'affichage du montant dans les instructions de paiement
            document.getElementById('frais-inscription-display').textContent = `${amount.toLocaleString('fr-FR')} XOF`;
            document.getElementById('frais-instruction-detail').textContent = `${amount.toLocaleString('fr-FR')} XOF`;
            document.getElementById('payment-description-text').innerHTML = `Veuillez effectuer le règlement de <span class="font-extrabold text-primary">${amount.toLocaleString('fr-FR')} XOF}</span> pour ${description} vers les numéros ci-dessous.`;
            
            showSection('instructions-paiement');
        }


        /**
         * Débloque l'accès et affiche la sélection des actes (Simulation de confirmation de paiement).
         * @param {string} transactionId - L'ID de transaction saisi par l'utilisateur.
         */
        function unlockAccess(transactionId) {
            console.log(`Tentative de déverrouillage avec l'ID: ${transactionId} pour l'offre : ${selectedOffer}`);

            if (!transactionId || transactionId.length < 5) {
                showModal(
                    "Erreur de Saisie", 
                    "Veuillez saisir un ID de transaction valide (au moins 5 caractères).",
                    "text-red-500"
                );
                return;
            }

            // SIMULATION DE DÉVERROUILLAGE CÔTÉ CLIENT (INSECURISÉ !)
            isAccessGranted = true;
            
            const message = selectedOffer === 'abonnement' ?
                `Accès Illimité à la plateforme pour ${dureeAbonnement} activé (Simulation).` :
                "Accès débloqué pour 1 acte unique (Simulation).";

            showModal(
                "Accès Débloqué !",
                `L'ID <span class="font-bold">${transactionId}</span> a été enregistré. ${message}`,
                "text-green-500"
            );
            
            document.getElementById('instructions-paiement').classList.add('hidden');

            // Retirer le verrouillage visuel sur les cartes d'actes
            document.querySelectorAll('.act-card-locked').forEach(card => {
                card.classList.remove('opacity-50', 'pointer-events-none');
                card.classList.add('hover:shadow-xl', 'hover:scale-[1.02]');
            });
            
            showSection('choix-acte');
            
            // Si c'est un acte unique, on ajoute une alerte visuelle au niveau de la sélection des actes
            if (selectedOffer === 'acte_unique') {
                document.getElementById('acte-count-display').classList.remove('text-green-600');
                document.getElementById('acte-count-display').classList.add('text-orange-money', 'font-extrabold');
                // Mise à jour de l'état pour les cas où l'utilisateur a juste payé un acte unique sans l'utiliser
                document.getElementById('acte-count-display').textContent = "1 Acte Unique";
            }
        }


        /**
         * Fonction principale pour afficher le formulaire de l'acte sélectionné.
         * @param {string} actId - L'ID unique de l'acte (ex: 'domiciliation', 'revenus').
         */
        function showActForm(actId) {
            // Vérification de l'accès (toujours requise)
            if (!isAccessGranted) {
                showModal(
                    "Accès Restreint",
                    "Veuillez d'abord sélectionner et payer une offre pour débloquer l'accès aux formulaires.",
                    "text-red-500"
                );
                // On s'assure que l'utilisateur voit l'écran de choix d'offre
                showSection('choix-offre');
                return;
            }
            
            // Vérification si l'offre est "acte unique" et si l'acte a déjà été utilisé (Simulation)
            if (selectedOffer === 'acte_unique' && localStorage.getItem('acte_unique_used') === 'true') {
                 showModal(
                    "Limite Atteinte",
                    "Vous avez sélectionné l'offre 'Acte Unique', et cet acte a déjà été généré. Veuillez souscrire à l'abonnement annuel pour continuer.",
                    "text-red-500"
                );
                return;
            }


            // 1. Cacher l'écran de sélection des actes
            document.getElementById('choix-acte').classList.add('hidden');

            // 2. Cacher tous les formulaires spécifiques (Sécurité)
            document.querySelectorAll('.act-form-section').forEach(form => {
                form.classList.add('hidden');
            });

            // 3. Afficher le formulaire spécifique demandé
            const selectedForm = document.getElementById(`form-${actId}`);
            if (selectedForm) {
                selectedForm.classList.remove('hidden');
                
                // 4. Faire défiler la page jusqu'au formulaire pour une meilleure UX
                selectedForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        /**
         * Fonction pour revenir à l'écran de sélection
         */
        function goBackToSelection() {
            // S'assurer que la section 'choix-acte' est active
            showSection('choix-acte');

            // Cacher tous les formulaires spécifiques
            document.querySelectorAll('.act-form-section').forEach(form => {
                form.classList.add('hidden');
            });
            
            // Faire défiler la page jusqu'au sélecteur
            document.getElementById('choix-acte').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }


        /**
         * Fonction de simulation de soumission de formulaire (à remplacer par votre logique API/envoi de données)
         */
        function handleFormSubmit(event) {
            event.preventDefault();
            const formTitle = event.target.getAttribute('data-act-name');
            
            // Simulation du traitement
            const submitButton = event.target.querySelector('button[type="submit"]");
            if (submitButton) {
                submitButton.textContent = "Génération en cours...";
                submitButton.disabled = true;
                submitButton.classList.add('opacity-70');
            }

            setTimeout(() => {
                // Si c'est un acte unique, on marque l'acte comme utilisé (simulation)
                if (selectedOffer === 'acte_unique') {
                    localStorage.setItem('acte_unique_used', 'true');
                    // Mise à jour de l'affichage du compteur
                    document.getElementById('acte-count-display').textContent = "0 Acte Restant (Veuillez vous abonner)";
                    
                    showModal(
                        "Génération Réussie",
                        `Le document d'<span class="font-bold">${formTitle}</span> a été généré avec succès (Simulation). <br><br>⚠️ **Limite Atteinte :** Vous avez utilisé votre acte unique. Veuillez choisir l'abonnement pour générer d'autres documents.`,
                        "text-primary"
                    );
                } else {
                    showModal(
                        "Génération Réussie",
                        `Le document d'<span class="font-bold">${formTitle}</span> a été généré avec succès (Simulation). Vous pouvez le télécharger !`,
                        "text-primary"
                    );
                }


                if (submitButton) {
                    submitButton.textContent = "Générer le Document";
                    submitButton.disabled = false;
                    submitButton.classList.remove('opacity-70');
                }
                event.target.reset(); 
                goBackToSelection(); // Retour à la sélection après la génération (simulation)
            }, 2000);
        }

        // Attribution des liens WhatsApp et des événements de soumission
        document.addEventListener('DOMContentLoaded', () => {
            // Affichage des montants dans la section de choix de l'offre
            document.getElementById('abonnement-duree').textContent = dureeAbonnement;
            document.getElementById('abonnement-prix').textContent = `${fraisAbonnement.toLocaleString('fr-FR')} XOF`;
            document.getElementById('acte-unique-prix').textContent = `${fraisActeUnique.toLocaleString('fr-FR')} XOF`;
            
            // Affichage des numéros dans la section de paiement
            document.getElementById('orange-money-number-display').textContent = orangeMoneyNumber;
            document.getElementById('moov-wave-number-display').textContent = moovWaveNumber;
            
            // Initialisation des boutons de navigation et de contact
            const heroCtaButton = document.getElementById('hero-platform-link');
            if (heroCtaButton) {
                heroCtaButton.onclick = function(e) {
                    e.preventDefault();
                    showOfferSelection();
                };
            }
            
            // Si le localStorage indique que l'acte unique a été utilisé, mettre à jour l'état initial
            if (localStorage.getItem('acte_unique_used') === 'true') {
                 isAccessGranted = true;
                 selectedOffer = 'acte_unique';
                 // Initialiser l'affichage sur la sélection des actes si l'acte unique est utilisé
                 showSection('choix-acte');
                 document.getElementById('acte-count-display').textContent = "0 Acte Restant (Veuillez vous abonner)";
                 document.getElementById('acte-count-display').classList.remove('text-green-600');
                 document.getElementById('acte-count-display').classList.add('text-orange-money', 'font-extrabold');
                 
                 // Débloquer visuellement les cartes, mais la logique showActForm() bloquera l'accès réel
                 document.querySelectorAll('.act-card-locked').forEach(card => {
                    card.classList.remove('opacity-50', 'pointer-events-none');
                    card.classList.add('hover:shadow-xl', 'hover:scale-[1.02]');
                 });
                 
                 // On cache le CTA principal pour aller directement à la sélection (après vérification)
                 document.getElementById('hero-cta-section').classList.add('hidden');
            }


            // Liens WhatsApp (Contact Direct) et autres initialisations (idem)
            const whatsappLinks = [
                'header-whatsapp-link',
                'floating-whatsapp-link',
                'aide-whatsapp-link' // NOUVEAU LIEN POUR LA PAGE AIDE
            ];
            whatsappLinks.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.href = whatsappLink;
                }
            });

            // Afficher le numéro de téléphone dans le pied de page et la section aide
            const phoneDisplays = [
                { id: 'footer-phone-display', prefix: 'tel:' }, 
                { id: 'aide-phone-display', prefix: 'tel:' },
                { id: 'aide-whatsapp-number-display', prefix: whatsappLink.replace(/\?.*/, '') } // lien wa.me
            ];
            
            phoneDisplays.forEach(item => {
                const element = document.getElementById(item.id);
                if (element) {
                    element.textContent = supportPhoneNumber;
                    if (item.prefix.startsWith('tel:')) {
                        element.href = `tel:${supportPhoneNumber.replace(/ /g, '')}`;
                    } else if (item.prefix.startsWith('https://wa.me/')) {
                        // Utiliser la construction de lien WhatsApp (pour l'icône)
                        element.href = whatsappLink;
                    }
                }
            });

            // Attacher l'événement de soumission simulée à tous les formulaires
            document.querySelectorAll('.act-form-section form').forEach(form => {
                form.addEventListener('submit', handleFormSubmit);
            });
            
            // Attacher l'événement de fermeture de la modale à l'overlay et au bouton
            document.getElementById('custom-modal-close-btn').addEventListener('click', closeModal);
            
            // Si l'accès n'est pas débloqué et l'acte unique n'a pas été utilisé, montrer la section par défaut
            if (!isAccessGranted && localStorage.getItem('acte_unique_used') !== 'true') {
                document.getElementById('hero-cta-section').classList.remove('hidden');
            }
        });
    </script>
    <!-- Fin du Script de Configuration -->

    <!-- En-tête de la Page (Navigation simplifiée) -->
    <header class="w-full max-w-4xl flex justify-between items-center py-4 mb-8">
        <div class="text-2xl font-extrabold text-primary">
            Certi<sp
