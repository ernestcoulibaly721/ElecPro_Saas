{% extends "layout.html" %}
{% block content %}
<div class="card p-4 shadow-sm mb-4">
    <h3>Ajouter un nouveau client / chantier</h3>
    <form action="/ajouter_client" method="POST" class="row g-3">
        <div class="col-md-6">
            <input type="text" name="nom_complet" class="form-control" placeholder="Nom du client" required>
        </div>
        <div class="col-md-4">
            <input type="text" name="adresse_chantier" class="form-control" placeholder="Lieu du chantier">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">Ajouter</button>
        </div>
    </form>
</div>

<h3>Mes Devis en cours</h3>
<div class="list-group">
    {% for client in clients %}
    <div class="list-group-item d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">{{ client.nom_complet }}</h5>
            <small>{{ client.adresse_chantier }}</small>
        </div>
        <div>
            <a href="/creer_devis/{{ client.id }}" class="btn btn-primary btn-sm">Gérer le devis</a>
            <a href="/supprimer_client/{{ client.id }}" class="btn btn-danger btn-sm">Supprimer</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
