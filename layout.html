<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElecPro SaaS ⚡</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #f1c40f; --dark-bg: #2c3e50; }
        body { background-color: #f4f7f6; }
        .navbar { background-color: var(--dark-bg); border-bottom: 4px solid var(--primary-color); }
        .btn-primary { background-color: var(--primary-color); border: none; color: black; font-weight: bold; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">⚡ ElecPro <span class="badge bg-warning text-dark">SaaS</span></a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Tableau de bord</a>
            <a class="nav-link" href="/ajouter_client">Nouveau Client</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
